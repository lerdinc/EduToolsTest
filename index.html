<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #fce4ec 0%, #e1f5fe 25%, #f3e5f5 50%, #fff9c4 75%, #e8f5e9 100%);
    background-size: 400% 400%;
    animation: gradientShift 12s ease infinite;
    padding: 20px;
  }

  @keyframes gradientShift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 2.6rem;
    color: #5e35b1;
    margin-bottom: 12px;
    text-shadow: 2px 2px 0 rgba(255,255,255,0.6);
  }

  .subtitle {
    color: #7e57c2;
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 40px;
  }

  .cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    width: 95vw;
    max-width: 900px;
  }

  .nav-card {
    background: #fff;
    border-radius: 24px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.1), 0 0 0 4px rgba(255,255,255,0.5);
    padding: 36px 24px;
    text-align: center;
    text-decoration: none;
    color: inherit;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .nav-card:hover {
    transform: translateY(-8px) scale(1.03);
    box-shadow: 0 16px 50px rgba(0,0,0,0.18), 0 0 0 4px rgba(255,255,255,0.6);
  }

  .nav-card:active {
    transform: translateY(-2px) scale(0.98);
  }

  .card-icon {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.2rem;
  }

  .card-icon.storybook { background: linear-gradient(135deg, #ce93d8, #ab47bc); }
  .card-icon.matching  { background: linear-gradient(135deg, #42a5f5, #1e88e5); }
  .card-icon.quiz      { background: linear-gradient(135deg, #ff8a65, #ef5350); }

  .card-title {
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem;
    color: #5e35b1;
  }

  .card-desc {
    font-size: 0.9rem;
    color: #888;
    line-height: 1.4;
  }

  @media (max-width: 650px) {
    .cards {
      grid-template-columns: 1fr;
      max-width: 360px;
    }
    h1 { font-size: 2rem; }
    .nav-card { padding: 28px 20px; }
  }
</style>
</head>
<body>

<h1>My Learning Hub</h1>
<p class="subtitle">Pick an activity to get started</p>

<div class="cards">
  <a class="nav-card" href="Storybook/storybook.html">
    <div class="card-icon storybook">📖</div>
    <div class="card-title">Storybook</div>
    <div class="card-desc">Flip through pages and listen to the story</div>
  </a>

  <a class="nav-card" href="Matching-Game/matching-game.html">
    <div class="card-icon matching">🧩</div>
    <div class="card-title">Matching Game</div>
    <div class="card-desc">Drag and drop to match the pairs</div>
  </a>

  <a class="nav-card" href="Storybook/quiz-game.html">
    <div class="card-icon quiz">🎧</div>
    <div class="card-title">Listen & Match</div>
    <div class="card-desc">Listen to audio and pick the right image</div>
  </a>
</div>

</body>
</html>
